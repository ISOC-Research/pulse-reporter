# ============================================================================
# Query Configuration - DNSSEC Adoption
# Pillar: Security / DNS Security
# ============================================================================

queries:
  "1.cypher":
    description: "Ranking of the top 25 most popular domains by DNS query percentage for a given country."
    
    template: |
      Title: Top 25 Most Popular Domains by DNS Query Percentage for {{ params.countryCode | upper }}
      
      This analysis retrieves the 25 most popular domains for the specified country based on the percentage of DNS queries. It highlights the domains that are most frequently queried, providing insights into the browsing habits and preferences of users in the country.
      
      {% if results %}
      **Top {{ results|length }} domains by query percentage:**
      
      {% for item in results %}
      - **Rank {{ loop.index }}:** {{ item.domainName }}
        Query Percentage: **{{ "%.2f"|format(item.queryPercentage) }}%**
      {% endfor %}
      
      {% if results|length >= 25 %}
      _(Results are limited to the top 25 domains)_
      {% endif %}
      
      {% else %}
      No popular domains were identified for this country.
      {% endif %}

    fields:
      domainName:
        type: "string"
        label: "Domain Name"
      queryPercentage:
        type: "float"
        label: "Query Percentage"
        format: "percentage_2"

    max_display: 25
    sort_by: "queryPercentage"
    sort_order: "desc"

  "2.cypher":
    description: "Ranking of the top 25 domains resolved to IPs hosted in the target country, based on Tranco popularity."
    
    template: |
      Title: Top 25 Domains Resolved to IPs Hosted in {{ params.countryCode | upper }} Based on Tranco Popularity
      
      This analysis identifies domains from the Tranco top 1M list that resolve to IPs hosted in the target country. It ranks these domains by their popularity, providing insights into the most prominent domains hosted locally and their hosting ASNs.
      
      {% if results %}
      **Top {{ results|length }} domains resolved to local IPs:**
      
      {% for item in results %}
      - **Rank {{ loop.index }}:** {{ item.domainName }}
        Tranco Rank: **{{ item.popularityRank }}**
        Hosting ASN: **AS{{ item.hostingASN }}**
      {% endfor %}
      
      {% if results|length >= 25 %}
      _(Results are limited to the top 25 domains)_
      {% endif %}
      
      {% else %}
      No domains from the Tranco top 1M were resolved to IPs hosted in this country.
      {% endif %}

    fields:
      domainName:
        type: "string"
        label: "Domain Name"
      popularityRank:
        type: "integer"
        label: "Tranco Popularity Rank"
        format: "number"
      hostingASN:
        type: "integer"
        label: "Hosting ASN"
        format: "number"

    max_display: 25
    sort_by: "popularityRank"
    sort_order: "asc"

  "3.cypher":
    description: "DNSSEC signing status of the most locally queried domains"
    
    template: |
      Title: DNSSEC Signing Status of Popular Domains in {{ params.countryCode | upper }}
      
      This analysis checks whether the most queried domains in the country have DNSSEC-signed zones. DNSSEC (DNS Security Extensions) adds cryptographic authentication to DNS responses, protecting users from DNS cache poisoning and man-in-the-middle attacks on DNS resolution. Domains with DNSSEC signing significantly reduce the risk of DNS-based attacks targeting local users.
      
      {% if results %}
      **DNSSEC Status of Most Queried Domains:**
      
      | Domain Name | Query Percentage | DNSSEC Signed |
      |-------------|-----------------|---------------|
      {% for row in results %}
      | {{ row.domainName }} | {{ "%.4f"|format(row.queryPercentage) }}% | {{ row.dnssecSigned if row.dnssecSigned is not none else "Unknown" }} |
      {% endfor %}
      
      **Interpretation:**
      
      Domains marked with a truthy DNSSEC value have cryptographically authenticated DNS zones. Users resolving these domains through DNSSEC-validating resolvers are protected from DNS spoofing attacks. Widely queried domains without DNSSEC represent the highest-impact targets for DNSSEC deployment campaigns in the country.
      
      {% else %}
      No DNSSEC signing data available for popular domains in this country. This may indicate that the DomainName nodes in the database do not yet have a 'dnssec' property populated for this country's queried domains.
      {% endif %}
    
    fields:
      domainName:
        type: "string"
        label: "Domain Name"
      queryPercentage:
        type: "float"
        label: "Query Percentage"
        format: "percentage_4"
      dnssecSigned:
        type: "string"
        label: "DNSSEC Signed"
    
    max_display: 25
    sort_by: "queryPercentage"
    sort_order: "desc"