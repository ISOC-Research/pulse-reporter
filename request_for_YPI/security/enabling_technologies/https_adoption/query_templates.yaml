# ============================================================================
# Query Configuration - HTTPS Adoption
# Pillar: Security / Enabling Technologies / HTTPS Adoption
# ============================================================================

queries:
  "1.cypher":
    description: "HTTPS adoption rate in a country based on Google ranking"
    
    template: |
      Title: HTTPS Adoption Rate for {{ params.countryCode | upper }}
      
      This analysis calculates the percentage of distinct hostnames in the country that are served over HTTPS, based on the Google ranking dataset. A high adoption rate indicates strong commitment to transport-layer security and encrypted communication.
      
      {% if results %}
      **Analysis Results:**
      
      - Total number of distinct hostnames: **{{ results[0].count_total }}**
      - Number of hostnames served over HTTPS: **{{ results[0].count_https }}**
      - HTTPS adoption percentage: **{{ "%.2f"|format(results[0].https_adoption_rate) }}%**
      
      **Interpretation:**
      
      An HTTPS adoption rate of **{{ "%.2f"|format(results[0].https_adoption_rate) }}%** indicates that approximately {{ "%.0f"|format(results[0].https_adoption_rate / 100 * results[0].count_total) }} out of {{ results[0].count_total }} hostnames use secure HTTPS connections. This metric reflects the maturity of web security practices in the country.
      
      {% else %}
      No hostname or HTTPS data available for this country.
      {% endif %}
    
    fields:
      https_adoption_rate:
        type: "float"
        label: "HTTPS Adoption Rate (%)"
        format: "float_2"
      count_https:
        type: "integer"
        label: "Number of HTTPS Hostnames"
      count_total:
        type: "integer"
        label: "Total Number of Hostnames"
    
    sort_by: "https_adoption_rate"
    sort_order: "desc"

  "2.cypher":
    description: "HTTPS adoption rate for locally queried domains — DNS query data based"
    
    template: |
      Title: HTTPS Adoption for Locally Queried Domains in {{ params.countryCode | upper }}
      
      This analysis examines HTTPS adoption among the most queried domains in the country using local DNS query data. Unlike the Google CrUX-based metric, this reflects the actual browsing patterns of the country's internet users — domains that are heavily queried locally but not served over HTTPS represent a direct security risk to the local population.
      
      {% if results %}
      **Analysis Results:**
      
      - Total locally queried domains: **{{ results[0].totalQueried }}**
      - Domains resolvable to IPs (active): **{{ results[0].resolvedDomains }}**
      - HTTPS-prefixed domains: **{{ results[0].httpsCount }}**
      - Local HTTPS adoption rate: **{{ results[0].httpsAdoptionRate }}%**
      
      {% else %}
      No locally-queried domain data available for this country.
      {% endif %}
    
    fields:
      totalQueried:
        type: "integer"
        label: "Total Locally Queried Domains"
      resolvedDomains:
        type: "integer"
        label: "Resolvable Domains"
      httpsCount:
        type: "integer"
        label: "HTTPS-Prefixed Domains"
      httpsAdoptionRate:
        type: "float"
        label: "Local HTTPS Adoption Rate (%)"
        format: "float_2"
    
    sort_by: "httpsAdoptionRate"
    sort_order: "desc"