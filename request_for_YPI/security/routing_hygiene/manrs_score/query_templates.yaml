# ============================================================================
# Query Configuration - MANRS Score
# Pillar: Security / Routing Hygiene / MANRS Score
# ============================================================================

queries:
  "1.cypher":
    description: "RPKI Route Origin Validation (ROV) adoption rate — the core MANRS routing security action"
    
    template: |
      Title: Routing Security (RPKI ROV) Adoption Rate for {{ params.countryCode | upper }}
      
      This analysis measures the percentage of Autonomous Systems (ASes) in the country that are actively validating RPKI Route Origin Authorizations (ROV). RPKI ROV is the primary technical action promoted by the MANRS initiative, and it directly prevents BGP route hijacking and prefix forgeries — a foundational requirement for a resilient internet.
      
      {% if results %}
      **Analysis Results:**
      
      - Total number of ASes in the country: **{{ results[0].totalASNsInCountry }}**
      - Number of ASes validating RPKI ROV: **{{ results[0].rpkiValidatingCount }}**
      - RPKI ROV adoption rate: **{{ results[0].adoptionRatePercentage }}%**
      
      **Interpretation:**
      
      An RPKI ROV adoption rate of **{{ results[0].adoptionRatePercentage }}%** means that approximately **{{ results[0].rpkiValidatingCount }}** out of **{{ results[0].totalASNsInCountry }}** Autonomous Systems actively filter and reject invalid BGP routes. A higher rate indicates greater resistance to routing hijacks and a more trustworthy national internet infrastructure.
      
      {% else %}
      No AS or RPKI validation data available for this country.
      {% endif %}
    
    fields:
      totalASNsInCountry:
        type: "integer"
        label: "Total Number of ASes"
      rpkiValidatingCount:
        type: "integer"
        label: "Number of ASes Validating RPKI ROV"
      adoptionRatePercentage:
        type: "float"
        label: "RPKI ROV Adoption Rate (%)"
        format: "float_2"
    
    sort_by: "adoptionRatePercentage"
    sort_order: "desc"

  "2.cypher":
    description: "Top ASes validating RPKI ROV in the country, ranked by customer cone size"
    
    template: |
      Title: Top RPKI-Validating ASes in {{ params.countryCode | upper }}
      
      This analysis lists the most influential Autonomous Systems in the country that are actively validating RPKI Route Origin Authorizations, ranked by their customer cone size (a measure of their reach and influence in the internet hierarchy). These are the networks whose routing hygiene has the greatest impact on the country's overall security posture.
      
      {% if results %}
      **Analysis Results:**
      
      A total of **{{ results | length }}** ASes with RPKI ROV validation operate in the country. The top 20 most significant (by customer cone size) are listed below:
      
      | ASN | AS Name | Customer Cone Size |
      |-----|---------|-------------------|
      {% for row in results %}
      | {{ row.asn }} | {{ row.asName or "(unnamed)" }} | {{ row.customerConeSize or "N/A" }} |
      {% endfor %}
      
      **Interpretation:**
      
      ASes with larger customer cone sizes that validate RPKI provide stronger routing security guarantees for downstream networks. When major national operators validate RPKI, they protect a larger share of the country's internet traffic from route hijacks.
      
      {% else %}
      No ASes with RPKI ROV validation found in this country.
      {% endif %}
    
    fields:
      asn:
        type: "integer"
        label: "Autonomous System Number"
      asName:
        type: "string"
        label: "AS Name"
      customerConeSize:
        type: "integer"
        label: "Customer Cone Size (number of ASNs)"
    
    sort_by: "customerConeSize"
    sort_order: "desc"
    limit: 20

  "3.cypher":
    description: "Routing hygiene action breakdown (RPKI + IRR tag distribution) for ASes in a country"
    
    template: |
      Title: Routing Hygiene Action Breakdown for {{ params.countryCode | upper }}
      
      This analysis shows the distribution of RPKI and IRR routing security tags across all Autonomous Systems in the country. RPKI (Resource Public Key Infrastructure) and IRR (Internet Routing Registry) status tags represent the two core routing hygiene actions promoted by MANRS: Origin Validation (RPKI) and Route Filtering (IRR).
      
      {% if results %}
      **Routing Hygiene Tag Distribution:**
      
      | Routing Hygiene Action | Number of ASes |
      |------------------------|---------------|
      {% for row in results %}
      | {{ row.routingHygieneAction }} | {{ row.implementingASNs }} |
      {% endfor %}
      
      **Interpretation Guide:**
      
      - **RPKI Valid / Validating RPKI ROV**: ASes actively implementing origin validation — the highest level of routing security.
      - **IRR Valid**: ASes with correctly registered routes in the Internet Routing Registry — enables route filtering by peers.
      - **RPKI NotFound / IRR NotFound**: ASes with no security record — highest risk for route hijacking.
      - **RPKI Invalid / IRR Invalid**: ASes with conflicting records — actively harmful to routing security.
      
      The proportion of `RPKI Valid` and `Validating RPKI ROV` to `RPKI NotFound` directly indicates the country's progress toward MANRS compliance.
      
      {% else %}
      No routing hygiene tag data available for this country.
      {% endif %}
    
    fields:
      routingHygieneAction:
        type: "string"
        label: "Routing Hygiene Action / Tag"
      implementingASNs:
        type: "integer"
        label: "Number of ASes"
    
    sort_by: "implementingASNs"
    sort_order: "desc"