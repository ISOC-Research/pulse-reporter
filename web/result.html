<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>IPv6 Analytics</title>

    <style>
      body {
        font-family: system-ui;
        background: #f5f7fb;
        padding: 2rem;
      }

      .card {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        max-width: 600px;
        margin: auto;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
      }

      h1 {
        margin-bottom: 1rem;
      }

      select,
      button {
        padding: 10px;
        margin-top: 10px;
        width: 100%;
        border-radius: 6px;
        border: 1px solid #ccc;
      }

      button {
        background: #4f46e5;
        color: white;
        border: none;
        cursor: pointer;
      }

      button:hover {
        background: #4338ca;
      }

      table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
      }

      th {
        background: #eef2ff;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>IPv6 Analytics Dashboard</h1>

      <label>Select Indicator:</label>
      <select id="indicatorDropdown">
        <option value="ipv6">IPv6</option>
        <option value="https">HTTPS</option>
        <option value="dnssec">DNSSEC</option>
      </select>

      <label>Select Country:</label>
      <select id="countryDropdown"></select>

      <button onclick="getSimilar()">Find Similar Countries</button>

      <div id="output"></div>
    </div>

    <script>
      // Load countries
      fetch("/countries")
        .then((res) => res.json())
        .then((data) => {
          const dropdown = document.getElementById("countryDropdown");

          data.countries.forEach((c) => {
            const option = document.createElement("option");
            option.value = c;
            option.textContent = c;
            dropdown.appendChild(option);
          });
        });

      // Fetch similar countries
      function getSimilar() {
  const country = document.getElementById("countryDropdown").value;
  const indicator = document.getElementById("indicatorDropdown").value;
  const output = document.getElementById("output");

  output.innerHTML = "Loading...";

  fetch(`/similar?country=${country}&indicator=${indicator}`)
    .then((res) => res.json())
    .then((data) => {
      if (data.error) {
        output.innerHTML = `<p style="color:red;">${data.error}</p>`;
        return;
      }

      // 🔥 Reference section
      let html = `
        <h3>Selected Country: ${data.reference.country}</h3>
      `;

      // =========================
      // 🔥 BINARY MODE (DNSSEC)
      // =========================
      if (data.type === "binary") {

        html += `
          <p><strong>${indicator.toUpperCase()}:</strong> 
            ${data.reference.average === 1 ? "Enabled ✅" : "Disabled ❌"}
          </p>

          <h4>🌍 Same Status</h4>
          <ul>
        `;

        data.same_group.slice(0, 10).forEach((c) => {
          html += `<li>${c.country}</li>`;
        });

        html += `</ul><h4>🌍 Different Status</h4><ul>`;

        data.different_group.slice(0, 10).forEach((c) => {
          html += `<li>${c.country}</li>`;
        });

        html += `</ul>`;

      }

      // =========================
      // 🔥 CONTINUOUS MODE (IPv6, HTTPS)
      // =========================
      else {

        html += `
          <p><strong>${indicator.toUpperCase()}:</strong> ${(data.reference.average * 100).toFixed(2)}%</p>
        `;

        html += `
          <table>
            <tr>
              <th>Country</th>
              <th>${indicator.toUpperCase()} (%)</th>
              <th>Difference</th>
            </tr>
        `;

        data.similar.forEach((c) => {
          html += `
            <tr>
              <td>${c.country}</td>
              <td>${(c.average * 100).toFixed(2)}%</td>
              <td>${(c.distance * 100).toFixed(2)}%</td>
            </tr>
          `;
        });

        html += "</table>";
      }

      output.innerHTML = html;
    })
    .catch((err) => {
      output.innerHTML = `<p style="color:red;">Error: ${err}</p>`;
    });
}
    </script>
  </body>
</html>
