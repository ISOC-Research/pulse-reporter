<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Intelligence Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      :root {
        --primary: #4f46e5;
        --bg: #f8fafc;
      }
      body {
        font-family: system-ui;
        background: var(--bg);
        padding: 2rem;
      }
      .container {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        max-width: 900px;
        margin: auto;
      }
      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr auto auto;
        gap: 1rem;
        margin-bottom: 2rem;
      }
      select,
      button {
        padding: 10px;
        border-radius: 6px;
      }
      button {
        background: var(--primary);
        color: white;
        border: none;
        cursor: pointer;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th,
      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
      }
      .spinner {
        border: 3px solid #eee;
        border-top: 3px solid var(--primary);
        border-radius: 50%;
        width: 20px;
        height: 20px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Network Intelligence</h1>

      <div class="controls">
        <select id="i">
          <option value="ipv6">IPv6</option>
          <option value="https">HTTPS</option>
          <option value="dnssec">DNSSEC</option>
        </select>

        <select id="c"></select>

        <button onclick="run()">Analyze</button>
        <button onclick="loadASN()">ISP IPv6</button>
        <button onclick="loadIPv6Gaps()">IPv6 Gaps</button>
      </div>

      <div id="out"></div>
      <div id="chartWrap" style="display: none; height: 400px">
        <canvas id="chart"></canvas>
      </div>
    </div>

      // Load dropdown
      fetch("/countries")
        .then((r) => r.json())
        .then((d) => {
          const el = document.getElementById("c");
          d.countries.forEach((code) => {
            const o = document.createElement("option");
            o.value = code;
            o.textContent = `${code} (${countryNames[code] || code})`;
            el.appendChild(o);
          });
        });

      // ANALYZE
      function run() {
        const c = document.getElementById("c").value;
        const i = document.getElementById("i").value;
        if (!c) {
          alert("Select country");
          return;
        }
        document.getElementById("out").innerHTML = "Loading...";
        fetch(`/similar?country=${c}&indicator=${i}`)
          .then((r) => r.json())
          .then((data) => {
            document.getElementById("out").innerHTML = `<h3>${c} loaded</h3>`;
          });
      }

      // ISP
      function loadASN() {
        const c = document.getElementById("c").value;
        if (!c) {
          alert("Select country first");
          return;
        }

        const out = document.getElementById("out");
        const wrap = document.getElementById("chartWrap");

        out.innerHTML = '<div class="spinner"></div>';
        wrap.style.display = "none";
        if (chart) chart.destroy();

        fetch(`/asn?country=${c}`)
          .then((r) => r.json())
          .then((data) => {
            if (!data.asns) {
              out.innerHTML = data.error;
              return;
            }

            const asns = data.asns;

            let html = `<h3>ISP IPv6 Deployment</h3><table>
        <tr><th>ISP</th><th>Market</th><th>IPv6</th><th>Category</th></tr>`;

            asns.forEach((a) => {
              html += `<tr>
            <td>${a.isp}</td>
            <td>${a.market_share.toFixed(2)}%</td>
            <td>${(a.ipv6_estimate * 100).toFixed(1)}%</td>
            <td>${a.category}</td>
            </tr>`;
            });

            html += "</table>";
            out.innerHTML = html;

            wrap.style.display = "block";

            const ctx = document.getElementById("chart").getContext("2d");

            chart = new Chart(ctx, {
              type: "bar",
              data: {
                labels: asns.map((a) => a.isp.slice(0, 20)),
                datasets: [
                  {
                    data: asns.map((a) => a.ipv6_estimate * 100),
                    backgroundColor: asns.map((a) => {
                      if (a.category === "High") return "#22c55e";
                      if (a.category === "Medium") return "#eab308";
                      return "#ef4444";
                    }),
                  },
                ],
              },
              options: {
                scales: { y: { beginAtZero: true, max: 100 } },
              },
            });
          });
      }
      function loadIPv6Gaps() {
        const country = document.getElementById("c").value;

        if (!country) {
          alert("Select country first");
          return;
        }

        const out = document.getElementById("out");
        const wrap = document.getElementById("chartWrap");

        out.innerHTML = "Loading IPv6 gaps...";
        wrap.style.display = "none";

        if (chart) {
          chart.destroy();
        }

        fetch(`/ipv6-gaps?country=${country}`)
          .then((r) => r.json())
          .then((data) => {
            if (!data.gaps) {
              out.innerHTML = `<p>${data.error || "No data"}</p>`;
              return;
            }

            const gaps = data.gaps;

            // =========================
            // 🚨 TABLE
            // =========================
            let html = `
        <h3>IPv6 Deployment Gaps</h3>

        <table>
            <tr>
                <th>ISP</th>
                <th>Cone Size</th>
                <th>Severity</th>
            </tr>
        `;

            gaps.forEach((g) => {
              let color = "#374151";

              if (g.severity === "Critical") {
                color = "#dc2626";
              } else if (g.severity === "High") {
                color = "#ea580c";
              } else if (g.severity === "Medium") {
                color = "#ca8a04";
              } else if (g.severity === "Low") {
                color = "#374151";
              }

              html += `
            <tr>
                <td>${g.isp}</td>
                <td>${g.customerConeSize}</td>
                <td>
                    <span style="
                        padding:4px 8px;
                        border-radius:6px;
                        background:${color};
                        color:white;
                        font-weight:bold;
                    ">
                        ${g.severity}
                    </span>
                </td>
            </tr>
            `;
            });

            html += "</table>";

            out.innerHTML = html;

            // =========================
            // 📊 CHART
            // =========================
            wrap.style.display = "block";

            const ctx = document.getElementById("chart").getContext("2d");

            chart = new Chart(ctx, {
              type: "bar",

              data: {
                labels: gaps.map((g) => g.isp.slice(0, 18)),

                datasets: [
                  {
                    label: "Customer Cone Size",

                    data: gaps.map((g) => g.customerConeSize),

                    backgroundColor: gaps.map((g) => {
                      if (g.severity === "Critical") return "#dc2626";

                      if (g.severity === "High") return "#ea580c";

                      if (g.severity === "Medium") return "#ca8a04";

                      return "#374151";
                    }),
                  },
                ],
              },

              options: {
                responsive: true,

                plugins: {
                  legend: {
                    display: false,
                  },
                },

                scales: {
                  y: {
                    beginAtZero: true,
                  },
                },
              },
            });
          })
          .catch((err) => {
            out.innerHTML = `
        <p style="color:red;">
            Error: ${err}
        </p>`;
          });
      }

</html>
