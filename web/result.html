<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>IPv6 Analytics</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      body {
        font-family: system-ui;
        background: #f5f7fb;
        padding: 2rem;
      }

      .card {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        max-width: 700px;
        margin: auto;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
      }

      h1 {
        margin-bottom: 1rem;
      }

      select,
      button {
        padding: 10px;
        margin-top: 10px;
        width: 100%;
        border-radius: 6px;
        border: 1px solid #ccc;
      }

      button {
        background: #4f46e5;
        color: white;
        border: none;
        cursor: pointer;
      }

      button:hover {
        background: #4338ca;
      }

      table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
      }

      th {
        background: #eef2ff;
      }

      canvas {
        margin-top: 25px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>IPv6 Analytics Dashboard</h1>

      <label>Select Indicator:</label>
      <select id="indicatorDropdown">
        <option value="ipv6">IPv6</option>
        <option value="https">HTTPS</option>
        <option value="dnssec">DNSSEC</option>
      </select>

      <label>Select Country:</label>
      <select id="countryDropdown"></select>

      <button onclick="getSimilar()">Find Similar Countries</button>

      <div id="output"></div>

      <h3 id="chartTitle" style="display: none">Visual Comparison</h3>
      <canvas id="chartCanvas"></canvas>
    </div>

        ZW: "Zimbabwe",

      function formatCountry(code) {
        return COUNTRY_MAP[code] ? `${code} (${COUNTRY_MAP[code]})` : code;
      }

      // Load countries
      fetch("/countries")
        .then((res) => res.json())
        .then((data) => {
          const dropdown = document.getElementById("countryDropdown");

          data.countries.forEach((c) => {
            const option = document.createElement("option");
            option.value = c;
            option.textContent = formatCountry(c);
            dropdown.appendChild(option);
          });
        });

      // Chart functions
      function renderBarChart(reference, similar) {
        const labels = [
          formatCountry(reference.country),
          ...similar.map((c) => formatCountry(c.country)),
        ];

        const data = [
          reference.average * 100,
          ...similar.map((c) => c.average * 100),
        ];

        const ctx = document.getElementById("chartCanvas").getContext("2d");

        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
          type: "bar",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Adoption %",
                data: data,
              },
            ],
          },
          options: {
            responsive: true,
            animation: {
              duration: 1000,
            },
            scales: {
              y: {
                beginAtZero: true,
              },
            },
          },
        });
      }

      function renderPieChart(sameGroup, differentGroup) {
        const ctx = document.getElementById("chartCanvas").getContext("2d");

        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
          type: "pie",
          data: {
            labels: ["Same Status", "Different Status"],
            datasets: [
              {
                data: [sameGroup.length, differentGroup.length],
              },
            ],
          },
        });
      }

      // Fetch similar countries
      function getSimilar() {
        const country = document.getElementById("countryDropdown").value;
        const indicator = document.getElementById("indicatorDropdown").value;
        const output = document.getElementById("output");
        const chartTitle = document.getElementById("chartTitle");

        output.innerHTML = "Loading...";
        chartTitle.style.display = "none";

        fetch(`/similar?country=${country}&indicator=${indicator}`)
          .then((res) => res.json())
          .then((data) => {
            if (data.error) {
              output.innerHTML = `<p style="color:red;">${data.error}</p>`;
              return;
            }

            let html = `
              <h3>Selected Country: ${formatCountry(data.reference.country)}</h3>
            `;

            if (data.type === "binary") {
              html += `
                <p><strong>${indicator.toUpperCase()}:</strong> 
                  ${data.reference.average === 1 ? "Enabled ✅" : "Disabled ❌"}
                </p>

                <h4>🌍 Same Status</h4>
                <ul>
              `;

              data.same_group.slice(0, 10).forEach((c) => {
                html += `<li>${formatCountry(c.country)}</li>`;
              });

              html += `</ul><h4>🌍 Different Status</h4><ul>`;

              data.different_group.slice(0, 10).forEach((c) => {
                html += `<li>${formatCountry(c.country)}</li>`;
              });

              html += `</ul>`;

              renderPieChart(data.same_group, data.different_group);
            } else {
              html += `
                <p><strong>${indicator.toUpperCase()}:</strong> ${(data.reference.average * 100).toFixed(2)}%</p>
              `;

              html += `
                <table>
                  <tr>
                    <th>Country</th>
                    <th>${indicator.toUpperCase()} (%)</th>
                    <th>Difference</th>
                  </tr>
              `;

              data.similar.forEach((c) => {
                html += `
                  <tr>
                    <td>${formatCountry(c.country)}</td>
                    <td>${(c.average * 100).toFixed(2)}%</td>
                    <td>${(c.distance * 100).toFixed(2)}%</td>
                  </tr>
                `;
              });

              html += "</table>";

              renderBarChart(data.reference, data.similar);
            }

            chartTitle.style.display = "block";
            output.innerHTML = html;
          })
          .catch((err) => {
            output.innerHTML = `<p style="color:red;">Error: ${err}</p>`;
          });
      }
    </script>
  </body>
</html>
